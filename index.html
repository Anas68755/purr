<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎮 Gam Lub</title>
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0a1a 0%, #1a1035 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f0eefe;
        }

        .hub {
            max-width: 900px;
            width: 100%;
        }

        /* ── header ── */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f5c542, #ff8a5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(255, 200, 50, 0.08);
            margin-bottom: 8px;
        }
        .header p {
            color: #9288b8;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
        .header p strong {
            color: #f5c542;
            font-weight: 600;
        }

        /* ── game grid ── */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* ── game card (button) ── */
        .game-card {
            background: rgba(20, 18, 48, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 30px 20px 24px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            position: relative;
            overflow: hidden;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 215, 0, 0.15);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
        }
        .game-card:active {
            transform: scale(0.96);
        }

        .game-card .icon {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 20px rgba(255, 200, 50, 0.1));
        }
        .game-card .name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f0ecff;
            margin-bottom: 4px;
        }
        .game-card .subtitle {
            font-size: 0.8rem;
            color: #9288b8;
            margin-bottom: 14px;
        }
        .game-card .play-btn {
            display: inline-block;
            padding: 8px 28px;
            border-radius: 60px;
            background: linear-gradient(135deg, #f5c542, #ff8a5c);
            color: #0b0a1a;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(245, 197, 66, 0.15);
        }
        .game-card .play-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 30px rgba(245, 197, 66, 0.25);
        }
        .game-card .play-btn:active {
            transform: scale(0.95);
        }

        /* ── special styling for blank/empty cards ── */
        .game-card.blank {
            border-color: rgba(255, 255, 255, 0.05);
            background: rgba(20, 18, 48, 0.3);
            opacity: 0.7;
        }
        .game-card.blank:hover {
            border-color: rgba(255, 255, 255, 0.12);
            opacity: 0.9;
        }
        .game-card .badge-empty {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #5d537a;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 0.5px;
        }

        /* ── glow effect ── */
        .game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── footer ── */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: #4a406a;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 24px;
        }
        .footer span {
            color: #6e6492;
        }
        .footer .hint {
            color: #5d537a;
            font-size: 0.75rem;
            margin-top: 6px;
        }

        /* ── responsive ── */
        @media (max-width: 640px) {
            .header h1 {
                font-size: 2.4rem;
            }
            .game-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 14px;
            }
            .game-card {
                padding: 22px 14px 18px;
                min-height: 160px;
            }
            .game-card .icon {
                font-size: 2.8rem;
            }
            .game-card .name {
                font-size: 1.1rem;
            }
            .game-card .play-btn {
                padding: 6px 20px;
                font-size: 0.8rem;
            }
        }
        @media (max-width: 400px) {
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .game-card {
                padding: 16px 10px 14px;
                min-height: 130px;
                border-radius: 20px;
            }
            .game-card .icon {
                font-size: 2rem;
            }
            .game-card .name {
                font-size: 0.9rem;
            }
            .game-card .subtitle {
                font-size: 0.65rem;
            }
            .game-card .play-btn {
                padding: 4px 14px;
                font-size: 0.7rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="hub">
    <!-- HEADER -->
    <header class="header">
        <h1>🎮 Gam Lub</h1>
        <p>Click any card to launch the game</p>
    </header>

    <!-- GAME GRID -->
    <div class="game-grid" id="gameGrid"></div>

    <!-- FOOTER -->
    <div class="footer">
        <span>✦ click a card to start</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ═══════════════════════════════════════════════════════════════
        //  🎮  EDIT THIS ARRAY TO CUSTOMIZE YOUR GAME BUTTONS
        // ═══════════════════════════════════════════════════════════════
        const GAMES = [
            // ── Button 1 ──
            {
                id: 'truth-or-dare',
                name: 'Truth or Dare',
                icon: '🔥',
                subtitle: '200+ prompts · party',
                file: 'games/truda.html',
                blank: false,
                new: true
            },
            // ── Button 2 (Blank) ──
            {
                id: 'chess-cards',
                name: 'Chess Cards',
                icon: '♟️',
                subtitle: 'Chess game · Smart bot · Special cards',
                file: 'games/chard.html',
                blank: false,
                new: true
            },
            {
                id: 'calc-chall',
                name: 'Calc Chall',
                icon: '🧮',
                subtitle: 'solve math problems · test your brain · beat the clock',
                file: 'games/calc-chall.html',
                blank: false,
                new: true
            },
            {
                id: 'purr-clicker',
                name: 'Purr Clicker',
                icon: '🐱',
                subtitle: 'click and have fun · relaxing game · collect purrs',
                file: 'games/purr-clicker.html',
                blank: false,
                new: true
            },
            {
                id: 'survivor-arcane',
                name: 'Survivor Arcane',
                icon: '⚔️',
                subtitle: 'hardcore survival roguelite · auto‑firing spells · endless hordes',
                file: 'games/survivor.html',
                blank: false,
                new: true
            },
            // ── Button 3 (Blank) ──
            {
                id: 'survircane-ar',
                name: 'الساحر الناجي',
                icon: '🗡️',
                subtitle: 'لعبة هاردكور روجلايت · هجمات تلقائية · حشود لا نهائية',
                file: 'games/survivor-ar.html',
                blank: false,
                new: true
            },
            // ── Button 4 (Blank) ──
            {
                id: 'cack-sim',
                name: 'CyberHack Sim',
                icon: '🌐',
                subtitle: 'hacking simulator that makes the player feel like a professional hacker',
                file: 'games/cack.html',
                blank: false,
                new: true
            },
            {
                id: 'russ-rul',
                name: 'Russian Roulette',
                icon: '🤠',
                subtitle: 'أكثر من 20 عقوبة متنوعة · لعب جماعي · مستويات صعوبة العقوبة مختلفة',
                file: 'games/revolver.html',
                blank: false,
                new: true
            },
            {
                id: '20-48',
                name: '2048',
                icon: '🅿️',
                subtitle: 'لعبة 2048 الشهيرة',
                file: 'games/2048.html',
                blank: false,
                new: true
            },
            // ── Button 5 (Blank) ──
            {
                id: 'mono-poly',
                name: 'Neon Monopoly X',
                icon: '🔘',
                subtitle: 'لعبة مونوبولي مصممة بقواعد جديدة قابلة للإضافة',
                file: 'games/monopoly.html',
                blank: false,
                new: true
            },
            {
                id: 'key-boar',
                name: 'Keyboar',
                icon: '🐗',
                subtitle: 'Focus and be fast · ركز وأسرع',
                file: 'games/keyboar.html',
                blank: false,
                new: true
            }
        ];
        // ═══════════════════════════════════════════════════════════════
        //  END OF EDITABLE SECTION
        // ═══════════════════════════════════════════════════════════════

        // ─── DOM REFS ──────────────────────────────────────────────────
        const grid = document.getElementById('gameGrid');

        // ─── RENDER ────────────────────────────────────────────────────
        function renderGames() {
            let html = '';
            for (const game of GAMES) {
                const blankClass = game.blank ? ' blank' : '';
                const newBadge = game.new ? `<span class="badge-empty">✦ new</span>` : '';
                const emptyBadge = game.blank ? `<span class="badge-empty">⏳ empty</span>` : '';

                html += `
                    <div class="game-card${blankClass}" 
                         data-id="${game.id}" 
                         data-file="${game.file}" 
                         data-blank="${game.blank}"
                         role="button" 
                         tabindex="0"
                         aria-label="${game.blank ? 'Empty slot - ' : ''}${game.name}">
                        ${newBadge}
                        ${emptyBadge}
                        <div class="icon">${game.icon}</div>
                        <div class="name">${game.name}</div>
                        <div class="subtitle">${game.subtitle}</div>
                        <button class="play-btn">${game.blank ? '⏳ Coming Soon' : '▶ Play'}</button>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        // ─── LAUNCH GAME ──────────────────────────────────────────────
        function launchGame(file, blank) {
            if (blank || file === '#') {
                // Show a playful alert for blank slots
                alert('🎮 This slot is empty!\n\nEdit the GAMES array in the code to add your game.\n\n💡 Look for the "EDIT THIS ARRAY" comment.');
                return;
            }
            window.location.href = file;
        }

        // ─── EVENT DELEGATION ─────────────────────────────────────────
        grid.addEventListener('click', function(e) {
            const card = e.target.closest('.game-card');
            if (!card) return;

            const file = card.dataset.file;
            const blank = card.dataset.blank === 'true';
            launchGame(file, blank);
        });

        // Keyboard support (Enter/Space on cards)
        grid.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                const card = e.target.closest('.game-card');
                if (!card) return;

                e.preventDefault();
                const file = card.dataset.file;
                const blank = card.dataset.blank === 'true';
                launchGame(file, blank);
            }
        });

        // ─── TOUCH FEEDBACK ────────────────────────────────────────────
        grid.addEventListener('touchstart', function(e) {
            const card = e.target.closest('.game-card');
            if (card) {
                card.style.transform = 'scale(0.96)';
            }
        }, { passive: true });

        grid.addEventListener('touchend', function(e) {
            const card = e.target.closest('.game-card');
            if (card) {
                card.style.transform = '';
            }
        }, { passive: true });

        // ─── INIT ──────────────────────────────────────────────────────
        renderGames();
        console.log('🎮 Gam Lub loaded');
        console.log(`📁 ${GAMES.length} game slots (${GAMES.filter(g => g.blank).length} blank)`);

    })();
</script>

</body>
  </html>
