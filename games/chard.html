<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strata: Card Chess vs Bot</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap');

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            touch-action: none;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            background: #1e293b;
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            aspect-ratio: 1;
            width: min(95vw, 50vh);
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 4.5vw, 32px);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 3px;
            position: relative;
        }

        .cell.light {
            background: #e2e8f0;
        }
        .cell.dark {
            background: #64748b;
        }

        .cell.selected {
            background: #fbbf24 !important;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.8);
        }

        .cell.valid-move {
            background: #10b981 !important;
            opacity: 0.7;
        }

        .cell.valid-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }

        .cell.bot-move {
            animation: botHighlight 1s ease-out;
        }

        @keyframes botHighlight {
            0% {
                background: #ef4444 !important;
            }
            100% {
                background: inherit;
            }
        }

        .piece {
            user-select: none;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.5));
            transition: transform 0.2s;
        }

        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #334155;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            min-width: 130px;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.6);
            transform: translateY(-8px);
        }

        .card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .card.vector {
            border-top: 4px solid #3b82f6;
        }
        .card.alteration {
            border-top: 4px solid #8b5cf6;
        }
        .card.reaction {
            border-top: 4px solid #10b981;
        }
        .card.special {
            border-top: 4px solid #f59e0b;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #turnIndicator {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 20px currentColor;
        }

        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(96, 165, 250, 0.8);
            }
        }

        .animate-pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes bot-pulse {
            0%,
            100% {
                box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
            }
        }

        .bot-thinking {
            animation: bot-pulse 1s ease-in-out infinite;
        }

        .message-popup {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, -40%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }

        @keyframes thinking-dots {
            0%,
            20% {
                content: '.';
            }
            40% {
                content: '..';
            }
            60%,
            100% {
                content: '...';
            }
        }

        .thinking-dots::after {
            content: '';
            animation: thinking-dots 1.5s infinite;
        }

        @media (max-width: 640px) {
            .card {
                min-width: 110px;
                padding: 8px !important;
            }
            .card .text-3xl {
                font-size: 22px;
            }
            .card .text-sm {
                font-size: 11px;
            }
            .card .text-xs {
                font-size: 9px;
            }
        }

        .score-bar {
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #fbbf24, #3b82f6);
            transition: width 0.5s ease;
        }

        /* RTL support */
        [dir="rtl"] .flex-row {
            flex-direction: row-reverse;
        }
        [dir="rtl"] .card-hand-scroll {
            direction: ltr;
        }
        [dir="rtl"] #board {
            direction: ltr;
        }
        [dir="rtl"] .text-left {
            text-align: right;
        }
        [dir="rtl"] .text-right {
            text-align: left;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 36px;
            text-align: center;
        }
        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .lang-btn.active {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #93bbfc;
        }
    </style>
</head>
<body class="flex flex-col h-screen" dir="ltr">

    <!-- Top Bar -->
    <div class="glass-panel p-2 flex justify-between items-center z-10">
        <div>
            <h1 class="text-lg font-bold text-white" style="font-family: 'Cinzel', serif;" id="titleText">STRATA</h1>
            <p class="text-xs text-gray-400" id="subtitleText">vs Smart Bot</p>
        </div>

        <div id="turnIndicator" class="glass-panel rounded-lg px-3 py-1 animate-pulse-glow">
            <div class="text-center">
                <div class="text-xs text-gray-400 uppercase" id="turnLabel">Turn</div>
                <div class="text-base font-bold text-blue-400" id="turnText">YOU</div>
            </div>
        </div>

        <div class="flex gap-1 items-center">
            <select id="difficulty" class="bg-gray-700 text-white text-xs px-2 py-1 rounded border-none outline-none">
                <option value="1" data-key="easy">Easy</option>
                <option value="2" selected data-key="normal">Normal</option>
                <option value="3" data-key="hard">Hard</option>
            </select>
            <button onclick="toggleLanguage()" class="lang-btn" id="langToggle">EN</button>
            <button onclick="resetGame()" class="bg-gray-700 hover:bg-gray-600 text-white px-2 py-1 rounded text-xs">
                ↻
            </button>
        </div>
    </div>

    <!-- Score Bar -->
    <div class="px-3 py-1">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span id="scoreBotLabel">Bot (Black)</span>
            <span id="evalText">0.0</span>
            <span id="scoreYouLabel">You (White)</span>
        </div>
        <div class="score-bar">
            <div class="score-fill" id="scoreFill" style="width: 50%;"></div>
        </div>
    </div>

    <!-- Game Board -->
    <div class="flex-1 flex items-center justify-center p-2 overflow-hidden">
        <div id="board" dir="ltr"></div>
    </div>

    <!-- Message Area -->
    <div id="messageArea" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50">
        <div id="gameMessage" class="glass-panel rounded-lg px-6 py-3 text-center opacity-0 transition-opacity duration-500">
            <div class="text-xl font-bold text-white" style="font-family: 'Cinzel', serif;" id="messageText"></div>
            <div class="text-xs text-gray-400 mt-1" id="messageSub"></div>
        </div>
    </div>

    <!-- Bottom Panel -->
    <div class="glass-panel p-2 z-10">
        <!-- Selected Card Info -->
        <div id="selectedCardInfo" class="mb-2 hidden">
            <div class="flex justify-between items-center gap-2">
                <div class="flex-1 min-w-0">
                    <div class="text-xs text-gray-400 uppercase" id="selectedLabel">Selected</div>
                    <div class="text-sm font-bold text-yellow-400 truncate" id="selectedCardName"></div>
                    <div class="text-xs text-gray-300 truncate" id="selectedCardDesc"></div>
                </div>
                <button onclick="clearSelectedCard()" class="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1 rounded text-sm" id="cancelBtn">Cancel</button>
            </div>
        </div>

        <!-- Card Hand -->
        <div class="mb-2">
            <div class="flex justify-between items-center mb-1">
                <div class="text-xs text-gray-400" id="yourCardsLabel">Your Cards (<span id="cardCount">0</span>/2)</div>
                <div class="flex gap-2 text-xs">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-blue-500 rounded"></span><span id="legendMove">Move</span></span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-500 rounded"></span><span id="legendAlter">Alter</span></span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 bg-yellow-500 rounded"></span><span id="legendSpecial">Special</span></span>
                </div>
            </div>
            <div id="cardHand" class="flex gap-2 overflow-x-auto pb-1 card-hand-scroll" dir="ltr"></div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2">
            <button id="endTurnBtn" onclick="endTurn()" class="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white py-2 rounded-lg font-bold active:scale-95 transition">
                End Turn
            </button>
            <button id="botStatusBtn" disabled class="flex-1 bg-gray-700 text-gray-400 py-2 rounded-lg font-bold">
                <span id="botStatusText">Waiting...</span>
            </button>
        </div>
    </div>

                    knight: { name: 'انتقال L', desc: 'تحرك بشكل L (حصان)' },

                    pawn: { name: 'زحف للأمام', desc: 'تحرك للأمام 1-2 خطوات' },
                    queen: { name: 'غامبت الملكة', desc: 'تحرك مثل الملكة' },
                    jump: { name: 'انتقال فوري', desc: 'قفز إلى أي مربع فارغ' },
                    slide: { name: 'انزلاق', desc: 'انزلق حتى 3 مربعات' },
                    doublemove: { name: 'حركة مزدوجة', desc: 'تحرك مرتين في هذه الجولة' },
                    swap: { name: 'تبادل', desc: 'تبادل المواقع' },
                    shield: { name: 'درع', desc: 'حماية قطعة' },
                    nuke: { name: 'تدمير', desc: 'تدمير منطقة 3x3' },
                    timewarp: { name: 'تشويه زمني', desc: 'احصل على جولة إضافية' },
                    gravity: { name: 'جاذبية', desc: 'سحب القطع إلى الهدف' }
                }
            }
        };

        let currentLang = 'en';

        function t(key) {
            const keys = key.split('.');
            let val = translations[currentLang];
            for (const k of keys) {
                if (val && typeof val === 'object' && k in val) val = val[k];
                else return key;
            }
            return val;
        }

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'ar' : 'en';
            document.getElementById('langToggle').textContent = currentLang.toUpperCase();
            document.documentElement.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
            document.body.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
            // Board and card hand stay LTR
            document.getElementById('board').dir = 'ltr';
            document.getElementById('cardHand').dir = 'ltr';
            updateLanguage();
            // Re-render board to refresh any text labels (none on board)
            renderBoard();
            // Update card hand
            updateCardHand();
            // Update selected card info
            if (gameState.selectedCard !== null) {
                const card = gameState.hand[gameState.selectedCard];
                if (card) updateSelectedCardInfo(card);
            }
            // Update eval bar labels
            updateEvalBar();
        }

        function updateLanguage() {
            // Title & subtitle
            document.getElementById('titleText').textContent = t('title');
            document.getElementById('subtitleText').textContent = t('subtitle');

            // Turn indicator
            document.getElementById('turnLabel').textContent = t('turn');
            const turnText = document.getElementById('turnText');
            if (gameState.currentTurn === 'white') {
                turnText.textContent = t('you');
                turnText.className = 'text-base font-bold text-blue-400';
            } else {
                turnText.textContent = t('bot');
                turnText.className = 'text-base font-bold text-red-400';
            }

            // Score labels
            document.getElementById('scoreBotLabel').textContent = t('scoreBot');
            document.getElementById('scoreYouLabel').textContent = t('scoreYou');

            // Difficulty dropdown
            const diffOpts = document.getElementById('difficulty').options;
            const diffKeys = ['easy', 'normal', 'hard'];
            for (let i = 0; i < diffOpts.length; i++) {
                const idx = diffOpts[i].value - 1;
                if (idx >= 0 && idx < diffKeys.length) {
                    diffOpts[i].textContent = t('difficulty.' + diffKeys[idx]);
                }
            }

            // Legend
            document.getElementById('legendMove').textContent = t('legendMove');
            document.getElementById('legendAlter').textContent = t('legendAlter');
            document.getElementById('legendSpecial').textContent = t('legendSpecial');

            // Selected card info
            document.getElementById('selectedLabel').textContent = t('selected');
            document.getElementById('cancelBtn').textContent = t('cancel');

            // Your cards label
            document.getElementById('yourCardsLabel').innerHTML = t('yourCards') + ' (<span id="cardCount">' + gameState.hand
                .length + '</span>/2)';

            // Buttons
            document.getElementById('endTurnBtn').textContent = t('endTurn');

            // Bot status
            const statusText = document.getElementById('botStatusText');
            if (gameState.botThinking) {
                statusText.innerHTML = t('thinking') + '<span class="thinking-dots"></span>';
            } else {
                statusText.textContent = t('waiting');
            }

            // Update card hand (already called from toggle)
            // Update selected card info if a card is selected
            if (gameState.selectedCard !== null) {
                const card = gameState.hand[gameState.selectedCard];
                if (card) updateSelectedCardInfo(card);
            }
        }

        function updateSelectedCardInfo(card) {
            const info = document.getElementById('selectedCardInfo');
            info.classList.remove('hidden');
            const trans = t('cards.' + card.id + '.name') || card.name;
            const transDesc = t('cards.' + card.id + '.desc') || card.desc;
            document.getElementById('selectedCardName').textContent = trans;
            document.getElementById('selectedCardDesc').textContent = transDesc;
        }

        // ============================================================
        //  GAME STATE
        // ============================================================
        const gameState = {
            currentTurn: 'white',
            selectedCard: null,
            selectedPiece: null,
            hand: [],
            botHand: [],
            deck: [],
            board: Array(8).fill(null).map(() => Array(8).fill(null)),
            gameOver: false,
            cardPlayedThisTurn: false,
            botThinking: false,
            difficulty: 2
        };

        //  CARD DATABASE
        // ============================================================

            { id: 'orthogonal', name: 'Orthogonal', type: 'vector', desc: 'Move in straight line (Rook)', icon: '↔',

            effect: 'extra' },
            { id: 'gravity', name: 'Gravity', type: 'special', desc: 'Pull pieces to target', icon: '⌫',
            effect: 'gravity' }
        ];

        const pieceSymbols = {
            'white-king': '♔',
            'white-queen': '♕',
            'white-rook': '♖',

            'black-bishop': '♝',

            'black-pawn': '♟'
        };

        const pieceValues = { pawn: 10, knight: 30, bishop: 31, rook: 50, queen: 90, king: 1000 };

        const pawnBonus = [
            [0, 0, 0, 0, 0, 0, 0, 0],
            [5, 5, 5, 5, 5, 5, 5, 5],
            [1, 1, 2, 3, 3, 2, 1, 1],
            [0.5, 0.5, 1, 2.5, 2.5, 1, 0.5, 0.5],

            [0.5, -0.5, -1, 0, 0, -1, -0.5, 0.5],
            [0.5, 1, 1, -2, -2, 1, 1, 0.5],
            [0, 0, 0, 0, 0, 0, 0, 0]
        ];

        const knightBonus = [
            [-5, -4, -3, -3, -3, -3, -4, -5],
            [-4, -2, 0, 0, 0, 0, -2, -4],
            [-3, 0, 1, 1.5, 1.5, 1, 0, -3],
            [-3, 0.5, 1.5, 2, 2, 1.5, 0.5, -3],
            [-3, 0, 1.5, 2, 2, 1.5, 0, -3],
            [-3, 0.5, 1, 1.5, 1.5, 1, 0.5, -3],
            [-4, -2, 0, 0.5, 0.5, 0, -2, -4],
            [-5, -4, -3, -3, -3, -3, -4, -5]
        ];

        // ============================================================
        //  BOARD FUNCTIONS
        // ============================================================
        function initializeBoard() {
            const backRow = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            for (let i = 0; i < 8; i++) {
                gameState.board[0][i] = { type: backRow[i], color: 'black' };
                gameState.board[1][i] = { type: 'pawn', color: 'black' };
                gameState.board[6][i] = { type: 'pawn', color: 'white' };
                gameState.board[7][i] = { type: backRow[i], color: 'white' };
            }
            renderBoard();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement('div');
                    const isLight = (row + col) % 2 === 0;
                    cell.className = `cell ${isLight ? 'light' : 'dark'}`;
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.onclick = () => handleCellClick(row, col);

                    const piece = gameState.board[row][col];
                    if (piece) {
                        const pieceEl = document.createElement('span');
                        pieceEl.className = `piece ${piece.color}`;
                        pieceEl.textContent = pieceSymbols[`${piece.color}-${piece.type}`];
                        cell.appendChild(pieceEl);
                    }
                    boardEl.appendChild(cell);
                }
            }
        }

        // ============================================================
        //  DECK & HAND
        // ============================================================
        function initializeDeck() {
            gameState.deck = [];
            for (let i = 0; i < 3; i++) {
                cardDatabase.forEach(card => {
                    gameState.deck.push({ ...card, uid: Math.random().toString(36).substr(2, 9) });
                });
            }
            gameState.deck.sort(() => Math.random() - 0.5);
            drawCards(2);
            drawBotCards(2);
        }

        function drawCards(count) {
            for (let i = 0; i < count; i++) {
                if (gameState.deck.length > 0 && gameState.hand.length < 2) {
                    gameState.hand.push(gameState.deck.pop());
                }
            }
            updateCardHand();
        }

        function drawBotCards(count) {
            for (let i = 0; i < count; i++) {
                if (gameState.deck.length > 0 && gameState.botHand.length < 2) {
                    gameState.botHand.push(gameState.deck.pop());
                }
            }
        }

        function updateCardHand() {
            const handDiv = document.getElementById('cardHand');
            document.getElementById('cardCount').textContent = gameState.hand.length;
            handDiv.innerHTML = '';

            const disabled = gameState.botThinking || gameState.currentTurn !== 'white';

            gameState.hand.forEach((card, index) => {
                const cardEl = document.createElement('div');
                const typeClass = card.type;
                const transType = t('cardTypes.' + card.type) || card.type;
                const transName = t('cards.' + card.id + '.name') || card.name;
                const transDesc = t('cards.' + card.id + '.desc') || card.desc;

                cardEl.className =
                    `card ${typeClass} flex-shrink-0 rounded-lg p-2 flex flex-col justify-between ${gameState.selectedCard === index ? 'selected' : ''} ${disabled ? 'disabled' : ''}`;
                cardEl.onclick = () => selectCard(index);

                cardEl.innerHTML = `
                        <div>
                            <div class="text-3xl mb-1">${card.icon}</div>
                            <div class="text-xs text-gray-400 uppercase">${transType}</div>
                            <div class="text-sm font-bold text-white leading-tight">${transName}</div>
                        </div>
                        <div class="text-xs text-gray-400 mt-1">${transDesc}</div>
                    `;
                handDiv.appendChild(cardEl);
            });

            // Update "Your Cards" label count
            document.getElementById('yourCardsLabel').innerHTML = t('yourCards') + ' (<span id="cardCount">' + gameState.hand
                .length + '</span>/2)';

            // Update legend
            document.getElementById('legendMove').textContent = t('legendMove');
            document.getElementById('legendAlter').textContent = t('legendAlter');
            document.getElementById('legendSpecial').textContent = t('legendSpecial');
        }

        function selectCard(index) {
            if (gameState.cardPlayedThisTurn || gameState.botThinking || gameState.currentTurn !== 'white') return;

            gameState.selectedCard = index;
            gameState.selectedPiece = null;
            updateCardHand();

            const card = gameState.hand[index];
            updateSelectedCardInfo(card);

            showValidMoves(card);
        }

        function clearSelectedCard() {
            gameState.selectedCard = null;
            gameState.selectedPiece = null;
            document.getElementById('selectedCardInfo').classList.add('hidden');
            updateCardHand();
            renderBoard();
        }

        // ============================================================
        //  MOVE VALIDATION
        // ============================================================
        function showValidMoves(card) {
            if (card.type !== 'vector') return;

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = gameState.board[r][c];
                    if (piece && piece.color === 'white') {
                        const moves = getValidMovesForPiece(card, r, c, piece);
                        moves.forEach(m => {
                            const idx = m.row * 8 + m.col;
                            const cells = document.querySelectorAll('.cell');
                            if (cells[idx]) cells[idx].classList.add('valid-move');
                        });
                    }
                }
            }
        }

        function getValidMovesForPiece(card, fromRow, fromCol, piece) {
            const moves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (r === fromRow && c === fromCol) continue;
                    const target = gameState.board[r][c];
                    if (target && target.color === piece.color) continue;
                    if (isValidMove(card, { row: fromRow, col: fromCol }, { row: r, col: c }, piece)) {
                        moves.push({ row: r, col: c });
                    }
                }
            }
            return moves;
        }

        function handleCellClick(row, col) {
            if (gameState.gameOver || gameState.botThinking || gameState.currentTurn !== 'white') return;

            const piece = gameState.board[row][col];

            if (gameState.selectedCard === null) {
                if (piece && piece.color === 'white') {
                    gameState.selectedPiece = { row, col };
                    renderBoard();
                    const idx = row * 8 + col;
                    document.querySelectorAll('.cell')[idx].classList.add('selected');
                }
                return;
            }

            const card = gameState.hand[gameState.selectedCard];

            if (gameState.selectedPiece === null) {
                if (piece && piece.color === 'white') {
                    gameState.selectedPiece = { row, col };
                    renderBoard();
                    const idx = row * 8 + col;
                    document.querySelectorAll('.cell')[idx].classList.add('selected');
                }
                return;
            }

            executeCard(card, gameState.selectedPiece, { row, col }, 'white');
        }

        function executeCard(card, from, to, color) {
            const piece = gameState.board[from.row][from.col];

            if (card.type === 'vector') {
                if (!isValidMove(card, from, to, piece)) {
                    if (color === 'white') showMessage(t('messages.invalidMove'), t('messages.notAllowed'));
                    return false;
                }

                const captured = gameState.board[to.row][to.col];
                gameState.board[to.row][to.col] = piece;
                gameState.board[from.row][from.col] = null;

                if (piece.type === 'pawn') {
                    if ((piece.color === 'white' && to.row === 0) || (piece.color === 'black' && to.row === 7)) {
                        gameState.board[to.row][to.col] = { type: 'queen', color: piece.color };
                    }
                }

                if (captured) {
                    if (captured.type === 'king') {
                        endGame(color);
                        return true;
                    }
                }

                if (color === 'white') {
                    gameState.hand.splice(gameState.selectedCard, 1);
                    gameState.cardPlayedThisTurn = true;
                    clearSelectedCard();
                    renderBoard();
                    updateEvalBar();
                    showMessage(t('messages.moveComplete'), `${piece.type} → ${getSquareName(to.row, to.col)}`);
                }
                return true;
            } else {
                return executeSpecialCard(card, from, to, color);
            }
        }

        function isValidMove(card, from, to, piece) {
            const rowDiff = to.row - from.row;
            const colDiff = to.col - from.col;
            const absRowDiff = Math.abs(rowDiff);
            const absColDiff = Math.abs(colDiff);
            const target = gameState.board[to.row][to.col];

            if (target && target.color === piece.color) return false;

            switch (card.moves) {
                case 'rook':
                    if (rowDiff !== 0 && colDiff !== 0) return false;
                    return isPathClear(from, to);
                case 'bishop':
                    if (absRowDiff !== absColDiff || absRowDiff === 0) return false;
                    return isPathClear(from, to);
                case 'knight':
                    return (absRowDiff === 2 && absColDiff === 1) || (absRowDiff === 1 && absColDiff === 2);
                case 'king':
                    return (absRowDiff <= 1 && absColDiff <= 1 && (absRowDiff + absColDiff > 0));
                case 'pawn':
                    const dir = piece.color === 'white' ? -1 : 1;
                    const startRow = piece.color === 'white' ? 6 : 1;
                    if (colDiff === 0 && !target) {
                        if (rowDiff === dir) return true;
                        if (rowDiff === 2 * dir && from.row === startRow && !gameState.board[from.row + dir][from.col])
                            return true;
                    }
                    if (absColDiff === 1 && rowDiff === dir && target && target.color !== piece.color) return true;
                    return false;
                case 'queen':
                    if (rowDiff !== 0 && colDiff !== 0 && absRowDiff !== absColDiff) return false;
                    return isPathClear(from, to);
                case 'teleport':
                    return !target;
                case 'slide':
                    if (absRowDiff > 3 && absColDiff > 3) return false;
                    if (rowDiff !== 0 && colDiff !== 0 && absRowDiff !== absColDiff) return false;
                    return isPathClear(from, to);
                default:
                    return true;
            }
        }

        function isPathClear(from, to) {
            const rowStep = Math.sign(to.row - from.row);
            const colStep = Math.sign(to.col - from.col);
            let r = from.row + rowStep;
            let c = from.col + colStep;
            while (r !== to.row || c !== to.col) {
                if (gameState.board[r][c]) return false;
                r += rowStep;
                c += colStep;
            }
            return true;
        }

        function executeSpecialCard(card, from, to, color) {
            switch (card.effect) {
                case 'swap':
                    if (gameState.board[to.row][to.col]) {
                        const temp = gameState.board[from.row][from.col];
                        gameState.board[from.row][from.col] = gameState.board[to.row][to.col];
                        gameState.board[to.row][to.col] = temp;
                    } else return false;
                    break;
                case 'nuke':
                    for (let r = to.row - 1; r <= to.row + 1; r++) {
                        for (let c = to.col - 1; c <= to.col + 1; c++) {
                            if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                                const p = gameState.board[r][c];
                                if (p && p.type !== 'king') gameState.board[r][c] = null;
                            }
                        }
                    }
                    break;
                case 'extra':
                    if (color === 'white') gameState.cardPlayedThisTurn = false;
                    break;
                default:
                    return false;
            }

            if (color === 'white') {
                gameState.hand.splice(gameState.selectedCard, 1);
                gameState.cardPlayedThisTurn = true;
                clearSelectedCard();
                renderBoard();
                updateEvalBar();
            }
            return true;
        }

        // ============================================================
        //  BOT AI
        // ============================================================
        function evaluateBoard() {
            let score = 0;
            let whiteMaterial = 0,
                blackMaterial = 0;

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = gameState.board[r][c];
                    if (!piece) continue;

                    const value = pieceValues[piece.type];
                    let posBonus = 0;

                    if (piece.type === 'pawn') {
                        posBonus = piece.color === 'white' ? pawnBonus[r][c] : pawnBonus[7 - r][c];
                    } else if (piece.type === 'knight') {
                        posBonus = knightBonus[piece.color === 'white' ? r : 7 - r][c];
                    } else if (piece.type === 'bishop' || piece.type === 'rook' || piece.type === 'queen') {
                        const centerDist = Math.abs(3.5 - r) + Math.abs(3.5 - c);
                        posBonus = (7 - centerDist) * 0.1;
                    }

                    if (piece.color === 'white') {
                        whiteMaterial += value;
                        score += value + posBonus;
                    } else {
                        blackMaterial += value;
                        score -= value + posBonus;
                    }
                }
            }

            const whiteMobility = countMobility('white');
            const blackMobility = countMobility('black');
            score += (whiteMobility - blackMobility) * 0.5;

            score += evaluateKingSafety('white') - evaluateKingSafety('black');

            return score / 10;
        }

        function countMobility(color) {
            let count = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = gameState.board[r][c];
                    if (piece && piece.color === color) {
                        count += getBasicMobility(r, c, piece);
                    }
                }
            }
            return count;
        }

        function getBasicMobility(row, col, piece) {
            let count = 0;
            const directions = [];

            if (piece.type === 'pawn') {
                const dir = piece.color === 'white' ? -1 : 1;
                if (row + dir >= 0 && row + dir < 8 && !gameState.board[row + dir][col]) count++;
                return count;
            }

            if (piece.type === 'knight') {
                const moves = [
                    [-2, -1],
                    [-2, 1],
                    [-1, -2],
                    [-1, 2],
                    [1, -2],
                    [1, 2],
                    [2, -1],
                    [2, 1]
                ];
                moves.forEach(([dr, dc]) => {
                    const nr = row + dr,
                        nc = col + dc;
                    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                        const t = gameState.board[nr][nc];
                        if (!t || t.color !== piece.color) count++;
                    }
                });
                return count;
            }

            if (piece.type === 'king') {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr,
                            nc = col + dc;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                            const t = gameState.board[nr][nc];
                            if (!t || t.color !== piece.color) count++;
                        }
                    }
                }
                return count;
            }

            if (piece.type === 'rook' || piece.type === 'queen') {
                directions.push([-1, 0], [1, 0], [0, -1], [0, 1]);
            }
            if (piece.type === 'bishop' || piece.type === 'queen') {
                directions.push([-1, -1], [-1, 1], [1, -1], [1, 1]);
            }

            directions.forEach(([dr, dc]) => {
                let r = row + dr,
                    c = col + dc;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const t = gameState.board[r][c];
                    if (!t) count++;
                    else {
                        if (t.color !== piece.color) count++;
                        break;
                    }
                    r += dr;
                    c += dc;
                }
            });

            return count;
        }

        function evaluateKingSafety(color) {
            let kingPos = null;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = gameState.board[r][c];
                    if (p && p.type === 'king' && p.color === color) {
                        kingPos = { row: r, col: c };
                        break;
                    }
                }
                if (kingPos) break;
            }
            if (!kingPos) return -1000;

            let safety = 0;
            const dir = color === 'white' ? 1 : -1;
            for (let dc = -1; dc <= 1; dc++) {
                const pr = kingPos.row + dir,
                    pc = kingPos.col + dc;
                if (pr >= 0 && pr < 8 && pc >= 0 && pc < 8) {
                    const p = gameState.board[pr][pc];
                    if (p && p.type === 'pawn' && p.color === color) safety += 2;
                }
            }

            const centerDist = Math.abs(3.5 - kingPos.row) + Math.abs(3.5 - kingPos.col);
            if (centerDist < 3) safety -= 2;

            return safety;
        }

        function getAllBotMoves() {
            const allMoves = [];

            gameState.botHand.forEach((card, cardIdx) => {
                if (card.type === 'vector') {
                    for (let r = 0; r < 8; r++) {
                        for (let c = 0; c < 8; c++) {
                            const piece = gameState.board[r][c];
                            if (piece && piece.color === 'black') {
                                const moves = getValidMovesForPiece(card, r, c, piece);
                                moves.forEach(m => {
                                    allMoves.push({
                                        cardIdx,
                                        card,
                                        from: { row: r, col: c },
                                        to: m,
                                        piece
                                    });
                                });
                            }
                        }
                    }
                } else if (card.effect === 'swap') {
                    for (let r1 = 0; r1 < 8; r1++) {
                        for (let c1 = 0; c1 < 8; c1++) {
                            const p1 = gameState.board[r1][c1];
                            if (!p1 || p1.color !== 'black') continue;
                            for (let r2 = 0; r2 < 8; r2++) {
                                for (let c2 = 0; c2 < 8; c2++) {
                                    const p2 = gameState.board[r2][c2];
                                    if (!p2 || p2.color !== 'black') continue;
                                    if (r1 === r2 && c1 === c2) continue;
                                    allMoves.push({
                                        cardIdx,
                                        card,
                                        from: { row: r1, col: c1 },
                                        to: { row: r2, col: c2 },
                                        piece: p1,
                                        special: 'swap'
                                    });
                                }
                            }
                        }
                    }
                } else if (card.effect === 'nuke') {
                    for (let r = 0; r < 8; r++) {
                        for (let c = 0; c < 8; c++) {
                            let whiteCount = 0;
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    const nr = r + dr,
                                        nc = c + dc;
                                    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                                        const p = gameState.board[nr][nc];
                                        if (p && p.color === 'white') whiteCount += pieceValues[p.type];
                                    }
                                }
                            }
                            if (whiteCount > 20) {
                                allMoves.push({
                                    cardIdx,
                                    card,
                                    from: { row: r, col: c },
                                    to: { row: r, col: c },
                                    special: 'nuke',
                                    nukeValue: whiteCount
                                });
                            }
                        }
                    }
                } else if (card.effect === 'extra') {
                    allMoves.push({
                        cardIdx,
                        card,
                        from: { row: 0, col: 0 },
                        to: { row: 0, col: 0 },
                        special: 'extra'
                    });
                }
            });

            return allMoves;
        }

        function scoreMove(move) {
            let score = 0;
            const savedBoard = gameState.board.map(r => r.map(c => c ? {...c } : null));
            const savedBotHand = [...gameState.botHand];

            if (move.special === 'nuke') {
                score = move.nukeValue * 2;
            } else if (move.special === 'extra') {
                score = 15;
            } else if (move.special === 'swap') {
                const temp = gameState.board[move.from.row][move.from.col];
                gameState.board[move.from.row][move.from.col] = gameState.board[move.to.row][move.to.col];
                gameState.board[move.to.row][move.to.col] = temp;
                const newEval = evaluateBoard();
                score = -newEval * 10;
                gameState.board = savedBoard;
            } else {
                const captured = gameState.board[move.to.row][move.to.col];
                if (captured) {
                    score += pieceValues[captured.type] * 10;
                    score -= pieceValues[move.piece.type] * 2;
                    if (captured.type === 'king') score += 10000;
                }

                gameState.board[move.to.row][move.to.col] = move.piece;
                gameState.board[move.from.row][move.from.col] = null;

                const newEval = evaluateBoard();
                score += -newEval * 5;

                if (isKingInDanger('black')) score -= 50;
                if (isKingInDanger('white')) score += 20;

                gameState.board = savedBoard;
            }

            const difficulty = gameState.difficulty;
            const noise = (Math.random() - 0.5) * (40 / difficulty);
            score += noise;

            return score;
        }

        function isKingInDanger(color) {
            let kingPos = null;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = gameState.board[r][c];
                    if (p && p.type === 'king' && p.color === color) {
                        kingPos = { row: r, col: c };
                        break;
                    }
                }
                if (kingPos) break;
            }
            if (!kingPos) return false;

            const enemy = color === 'white' ? 'black' : 'white';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = gameState.board[r][c];
                    if (p && p.color === enemy) {
                        if (canAttack(r, c, kingPos.row, kingPos.col, p)) return true;
                    }
                }
            }
            return false;
        }

        function canAttack(fromR, fromC, toR, toC, piece) {
            const dr = toR - fromR,
                dc = toC - fromC;
            const adr = Math.abs(dr),
                adc = Math.abs(dc);

            if (piece.type === 'pawn') {
                const dir = piece.color === 'white' ? -1 : 1;
                return dr === dir && adc === 1;
            }
            if (piece.type === 'knight') {
                return (adr === 2 && adc === 1) || (adr === 1 && adc === 2);
            }
            if (piece.type === 'king') {
                return adr <= 1 && adc <= 1 && (adr + adc > 0);
            }

            const directions = [];
            if (piece.type === 'rook' || piece.type === 'queen') {
                directions.push([-1, 0], [1, 0], [0, -1], [0, 1]);
            }
            if (piece.type === 'bishop' || piece.type === 'queen') {
                directions.push([-1, -1], [-1, 1], [1, -1], [1, 1]);
            }

            for (const [ddr, ddc] of directions) {
                let r = fromR + ddr,
                    c = fromC + ddc;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    if (r === toR && c === toC) return true;
                    if (gameState.board[r][c]) break;
                    r += ddr;
                    c += ddc;
                }
            }
            return false;
        }

        function botMove() {
            if (gameState.gameOver || gameState.currentTurn !== 'black') return;

            gameState.botThinking = true;
            updateCardHand();
            document.getElementById('botStatusText').innerHTML = t('thinking') + '<span class="thinking-dots"></span>';
            document.getElementById('turnIndicator').classList.remove('animate-pulse-glow');
            document.getElementById('turnIndicator').classList.add('bot-thinking');

            setTimeout(() => {
                const moves = getAllBotMoves();

                if (moves.length === 0) {
                    showMessage(t('messages.botPasses'), t('messages.noValidMoves'));
                    finishBotTurn();
                    return;
                }

                const scoredMoves = moves.map(m => ({ move: m, score: scoreMove(m) }));
                scoredMoves.sort((a, b) => b.score - a.score);

                const bestMove = scoredMoves[0].move;
                const bestCard = bestMove.card;

                showMessage(t('messages.botPlays'), `${bestCard.name}`);

                setTimeout(() => {
                    if (bestMove.special === 'nuke') {
                        executeSpecialCard(bestCard, bestMove.from, bestMove.to, 'black');
                    } else if (bestMove.special === 'extra') {
                        executeSpecialCard(bestCard, bestMove.from, bestMove.to, 'black');
                    } else if (bestMove.special === 'swap') {
                        executeSpecialCard(bestCard, bestMove.from, bestMove.to, 'black');
                    } else {
                        executeCard(bestCard, bestMove.from, bestMove.to, 'black');
                    }

                    const cardIdx = gameState.botHand.findIndex(c => c.uid === bestCard.uid);
                    if (cardIdx >= 0) gameState.botHand.splice(cardIdx, 1);

                    renderBoard();
                    const idx = bestMove.to.row * 8 + bestMove.to.col;
                    const cells = document.querySelectorAll('.cell');
                    if (cells[idx]) cells[idx].classList.add('bot-move');

                    updateEvalBar();

                    setTimeout(() => finishBotTurn(), 800);
                }, 600);
            }, 800);
        }

        function finishBotTurn() {
            gameState.botThinking = false;
            gameState.currentTurn = 'white';
            gameState.cardPlayedThisTurn = false;

            document.getElementById('turnText').textContent = t('you');
            document.getElementById('turnText').className = 'text-base font-bold text-blue-400';
            document.getElementById('turnIndicator').classList.add('animate-pulse-glow');
            document.getElementById('turnIndicator').classList.remove('bot-thinking');
            document.getElementById('botStatusText').textContent = t('waiting');

            gameState.hand = [];
            drawCards(2);
            updateCardHand();

            gameState.botHand = [];
            drawBotCards(2);
        }

        function updateEvalBar() {
            const eval_ = evaluateBoard();
            const normalized = Math.max(-10, Math.min(10, eval_));
            const percentage = 50 + (normalized * 5);
            document.getElementById('scoreFill').style.width = percentage + '%';
            document.getElementById('evalText').textContent = (eval_ >= 0 ? '+' : '') + eval_.toFixed(1);
        }

        // ============================================================
        //  GAME FLOW
        // ============================================================
        function endTurn() {
            if (gameState.gameOver || gameState.botThinking || gameState.currentTurn !== 'white') return;

            gameState.currentTurn = 'black';
            gameState.cardPlayedThisTurn = false;
            gameState.selectedCard = null;
            gameState.selectedPiece = null;

            document.getElementById('turnText').textContent = t('bot');
            document.getElementById('turnText').className = 'text-base font-bold text-red-400';

            clearSelectedCard();

            setTimeout(() => botMove(), 500);
        }

        function endGame(winner) {
            gameState.gameOver = true;
            if (winner === 'white') {
                showMessage(t('messages.victory'), t('messages.youWin'));
            } else {
                showMessage(t('messages.defeat'), t('messages.botWins'));
            }
        }

        function showMessage(title, subtitle = '') {
            const msgDiv = document.getElementById('gameMessage');
            document.getElementById('messageText').textContent = title;
            document.getElementById('messageSub').textContent = subtitle;
            msgDiv.classList.remove('opacity-0');
            msgDiv.classList.add('message-popup');
            setTimeout(() => {
                msgDiv.classList.add('opacity-0');
                msgDiv.classList.remove('message-popup');
            }, 1800);
        }

        function getSquareName(row, col) {
            return 'abcdefgh'[col] + (8 - row);
        }

        function resetGame() {
            gameState.currentTurn = 'white';
            gameState.selectedCard = null;
            gameState.selectedPiece = null;
            gameState.hand = [];
            gameState.botHand = [];
            gameState.deck = [];
            gameState.board = Array(8).fill(null).map(() => Array(8).fill(null));
            gameState.gameOver = false;
            gameState.cardPlayedThisTurn = false;
            gameState.botThinking = false;
            gameState.difficulty = parseInt(document.getElementById('difficulty').value);

            document.getElementById('turnText').textContent = t('you');
            document.getElementById('turnText').className = 'text-base font-bold text-blue-400';
            document.getElementById('turnIndicator').classList.add('animate-pulse-glow');
            document.getElementById('turnIndicator').classList.remove('bot-thinking');
            document.getElementById('botStatusText').textContent = t('waiting');

            initializeBoard();
            initializeDeck();
            clearSelectedCard();
            updateEvalBar();
            showMessage(t('messages.newGame'), t('messages.youPlayWhite'));
        }

        // ============================================================
        //  INIT
        // ============================================================
        document.getElementById('difficulty').addEventListener('change', (e) => {
            gameState.difficulty = parseInt(e.target.value);
        });

        // Fix: update turn label on language change after game start
        // We also need to override the turn update in endTurn / finishBotTurn

        // Override the turn updates to use t()
        const origEndTurn = endTurn;
        endTurn = function() {
            if (gameState.gameOver || gameState.botThinking || gameState.currentTurn !== 'white') return;
            gameState.currentTurn = 'black';
            gameState.cardPlayedThisTurn = false;
            gameState.selectedCard = null;
            gameState.selectedPiece = null;
            document.getElementById('turnText').textContent = t('bot');
            document.getElementById('turnText').className = 'text-base font-bold text-red-400';
            clearSelectedCard();
            setTimeout(() => botMove(), 500);
        };

        // Also override finishBotTurn to use t()
        const origFinishBotTurn = finishBotTurn;
        finishBotTurn = function() {
            gameState.botThinking = false;
            gameState.currentTurn = 'white';
            gameState.cardPlayedThisTurn = false;
            document.getElementById('turnText').textContent = t('you');
            document.getElementById('turnText').className = 'text-base font-bold text-blue-400';
            document.getElementById('turnIndicator').classList.add('animate-pulse-glow');
            document.getElementById('turnIndicator').classList.remove('bot-thinking');
            document.getElementById('botStatusText').textContent = t('waiting');
            gameState.hand = [];
            drawCards(2);
            updateCardHand();
            gameState.botHand = [];
            drawBotCards(2);
        };

        // Also override resetGame to use t()
        const origResetGame = resetGame;
        resetGame = function() {
            gameState.currentTurn = 'white';
            gameState.selectedCard = null;
            gameState.selectedPiece = null;
            gameState.hand = [];
            gameState.botHand = [];
            gameState.deck = [];
            gameState.board = Array(8).fill(null).map(() => Array(8).fill(null));
            gameState.gameOver = false;
            gameState.cardPlayedThisTurn = false;
            gameState.botThinking = false;
            gameState.difficulty = parseInt(document.getElementById('difficulty').value);
            document.getElementById('turnText').textContent = t('you');
            document.getElementById('turnText').className = 'text-base font-bold text-blue-400';
            document.getElementById('turnIndicator').classList.add('animate-pulse-glow');
            document.getElementById('turnIndicator').classList.remove('bot-thinking');
            document.getElementById('botStatusText').textContent = t('waiting');
            initializeBoard();
            initializeDeck();
            clearSelectedCard();
            updateEvalBar();
            showMessage(t('messages.newGame'), t('messages.youPlayWhite'));
        };

        // Also override botMove message to use t()
        const origBotMove = botMove;
        botMove = function() {
            if (gameState.gameOver || gameState.currentTurn !== 'black') return;
            gameState.botThinking = true;
            updateCardHand();
            document.getElementById('botStatusText').innerHTML = t('thinking') + '<span class="thinking-dots"></span>';
            document.getElementById('turnIndicator').classList.remove('animate-pulse-glow');
            document.getElementById('turnIndicator').classList.add('bot-thinking');
            setTimeout(() => {
                const moves = getAllBotMoves();
                if (moves.length === 0) {
                    showMessage(t('messages.botPasses'), t('messages.noValidMoves'));
                    finishBotTurn();
                    return;
                }
                const scoredMoves = moves.map(m => ({ move: m, score: scoreMove(m) }));
                scoredMoves.sort((a, b) => b.score - a.score);
                const bestMove = scoredMoves[0].move;
                const bestCard = bestMove.card;
                showMessage(t('messages.botPlays'), `${bestCard.name}`);
                setTimeout(() => {
                    if (bestMove.special === 'nuke') {
                        executeSpecialCard(bestCard, bestMove.from, bestMove.to, 'black');
                    } else if (bestMove.special === 'extra') {
                        executeSpecialCard(bestCard, bestMove.from, bestMove.to, 'black');
                    } else if (bestMove.special === 'swap') {
                        executeSpecialCard(bestCard, bestMove.from, bestMove.to, 'black');
                    } else {
                        executeCard(bestCard, bestMove.from, bestMove.to, 'black');
                    }
                    const cardIdx = gameState.botHand.findIndex(c => c.uid === bestCard.uid);
                    if (cardIdx >= 0) gameState.botHand.splice(cardIdx, 1);
                    renderBoard();
                    const idx = bestMove.to.row * 8 + bestMove.to.col;
                    const cells = document.querySelectorAll('.cell');
                    if (cells[idx]) cells[idx].classList.add('bot-move');
                    updateEvalBar();
                    setTimeout(() => finishBotTurn(), 800);
                }, 600);
            }, 800);
        };

        window.addEventListener('load', () => {
            initializeBoard();
            initializeDeck();
            updateEvalBar();
            // Set initial language to English
            currentLang = 'en';
            document.getElementById('langToggle').textContent = 'EN';
            document.documentElement.dir = 'ltr';
            document.body.dir = 'ltr';
            document.getElementById('board').dir = 'ltr';
            document.getElementById('cardHand').dir = 'ltr';
            updateLanguage();
            showMessage(t('messages.welcome'), t('messages.youPlayWhite'));
        });

        // Exports
        window.selectCard = selectCard;
        window.clearSelectedCard = clearSelectedCard;
        window.endTurn = endTurn;
        window.resetGame = resetGame;
        window.toggleLanguage = toggleLanguage;
    </script>

</body>
