<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔥 Math Challenge · 5 Lives 🔥</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Orbitron', monospace;
      padding: 16px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(255, 80, 0, 0.08) 0px, rgba(255, 80, 0, 0.08) 2px, transparent 2px, transparent 10px);
      pointer-events: none;
      z-index: 0;
      animation: flameDrift 0.4s linear infinite;
    }
    @keyframes flameDrift {
      0% { background-position: 0 0; }
      100% { background-position: 30px 30px; }
    }

    .game-container {
      max-width: 700px;
      width: 100%;
      background: rgba(8, 12, 25, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 64px;
      padding: 20px 16px 24px;
      box-shadow: 0 0 30px rgba(255, 60, 20, 0.6);
      border: 1px solid #ff5e3a;
      z-index: 2;
      position: relative;
    }

    .lives-area {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
    }
    .life {
      font-size: 28px;
      filter: drop-shadow(0 0 6px #ff4444);
    }

    .question-card {
      background: linear-gradient(145deg, #0e1625, #070b16);
      border-radius: 56px;
      padding: 20px 15px;
      margin-bottom: 20px;
      text-align: center;
      border: 2px solid #ff884d;
      box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
    }

    .question-text {
      font-size: 3rem;
      font-weight: 800;
      color: #ffcc77;
      text-shadow: 0 0 12px #ff6600;
      letter-spacing: 4px;
    }

    .timer-area {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .timer-bar-bg {
      flex: 1;
      background: #2a1e2a;
      border-radius: 40px;
      height: 12px;
      overflow: hidden;
    }
    .timer-bar-fill {
      background: linear-gradient(90deg, #facc15, #ff4d4d);
      width: 100%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.05s linear;
    }
    .timer-text {
      font-family: monospace;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffaa66;
      text-shadow: 0 0 5px red;
      min-width: 65px;
    }

    .combo-area {
      margin: 10px 0 0;
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffaa44;
    }
    .combo-glow {
      animation: pulseCombo 0.3s infinite alternate;
    }
    @keyframes pulseCombo {
      0% { text-shadow: 0 0 2px orange; transform: scale(1);}
      100% { text-shadow: 0 0 18px red; transform: scale(1.05);}
    }

    .stats-board {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 60px;
      padding: 12px 20px;
      margin: 12px 0 20px;
      border: 1px solid #ff884d;
    }
    .stat {
      color: #ffccaa;
      font-size: 0.9rem;
      font-weight: bold;
      text-align: center;
    }
    .stat span {
      display: block;
      color: #ffaa44;
      font-size: 1.6rem;
      font-weight: 800;
      margin-top: 4px;
    }

    .calculator {
      background: #0e1422cc;
      backdrop-filter: blur(12px);
      border-radius: 56px;
      padding: 18px;
      border: 1px solid #ff884d;
      box-shadow: 0 0 18px rgba(255, 100, 0, 0.5);
    }

    .display {
      background: #010f15;
      color: #ffaa66;
      font-size: 2rem;
      font-weight: bold;
      text-align: right;
      padding: 16px 20px;
      border-radius: 48px;
      font-family: monospace;
      letter-spacing: 4px;
      margin-bottom: 20px;
      border: 1px solid #ff884d;
      box-shadow: inset 0 0 12px #ff884d, 0 0 8px #ff884d;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .calc-btn {
      background: #1f2a3e;
      border: none;
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      padding: 14px 0;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.05s linear;
      box-shadow: 0 4px 0 #0a0f1a;
    }
    .calc-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0a0f1a;
    }
    .operator {
      background: #f39c12;
      color: #1e1a2a;
    }
    .equals {
      background: #e67e22;
      color: white;
      box-shadow: 0 4px 0 #b45f1b;
    }
    .special {
      background: #8e44ad;
      font-size: 1.2rem;
    }
    .clear-btn {
      background: #e67e22;
    }

    .message-area {
      background: #010a0fcc;
      border-radius: 40px;
      padding: 10px;
      margin-top: 18px;
      font-size: 0.9rem;
      color: #ffcc88;
      text-align: center;
      border-left: 5px solid #ff4d4d;
    }

    .leaderboard-section {
      background: #010a0faa;
      border-radius: 48px;
      padding: 12px 16px;
      margin-top: 20px;
      border: 1px solid #ffaa44;
    }
    .leaderboard-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffcc77;
      text-align: center;
      margin-bottom: 10px;
    }
    .leaderboard-list {
      max-height: 180px;
      overflow-y: auto;
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      color: #ffdd99;
      border-bottom: 1px solid #ff884d55;
      font-size: 0.9rem;
    }
    .leaderboard-rank {
      font-weight: bold;
      color: #ffaa44;
    }

    .game-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(10px);
      border-radius: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      gap: 15px;
      text-align: center;
      padding: 20px;
    }
    .game-over-text {
      font-size: 2rem;
      font-weight: bold;
      color: #ff7744;
      text-shadow: 0 0 15px red;
    }
    .final-score {
      font-size: 1.4rem;
      color: #ffcc88;
    }
    .name-input {
      padding: 12px 20px;
      border-radius: 60px;
      border: none;
      text-align: center;
      font-size: 1.2rem;
      background: #1f2a3e;
      color: white;
      width: 80%;
    }
    .save-btn {
      background: #2ecc71;
      border: none;
      padding: 12px 24px;
      font-size: 1.2rem;
      border-radius: 60px;
      font-weight: bold;
      color: black;
      cursor: pointer;
      box-shadow: 0 4px 0 #1b7943;
    }
    .restart-overlay-btn {
      background: #e67e22;
      border: none;
      padding: 12px 28px;
      font-size: 1.2rem;
      border-radius: 60px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 0 #b45f1b;
    }

    .shake {
      animation: shakeAnim 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes shakeAnim {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-4px, 0); }
      40% { transform: translate(4px, 0); }
      60% { transform: translate(-2px, 0); }
      80% { transform: translate(2px, 0); }
      100% { transform: translate(0, 0); }
    }

    @media (max-width: 550px) {
      .button-grid { gap: 6px; }
      .calc-btn { font-size: 1.2rem; padding: 10px 0; }
      .question-text { font-size: 2rem; }
      .timer-text { font-size: 1.2rem; }
      .game-over-text { font-size: 1.5rem; }
      .leaderboard-item { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<a href="index.html" class="back-btn" style="display:inline-block;margin-bottom:15px;padding:10px 20px;background:linear-gradient(135deg,#6e8efb,#a777e3);color:#fff;text-decoration:none;border-radius:25px;font-weight:bold;font-size:1rem;">← MENU</a>
<div class="game-container" id="gameContainer">
  <div class="lives-area" id="livesArea">❤️ ❤️ ❤️ ❤️ ❤️</div>
  <div class="question-card">
    <div class="question-text" id="questionText">0 + 0 = ?</div>
    <div class="timer-area">
      <div class="timer-bar-bg"><div class="timer-bar-fill" id="timerFill"></div></div>
      <div class="timer-text" id="timerText">10.0</div>
    </div>
    <div class="combo-area" id="comboDisplay">🔥 Combo: x1</div>
  </div>

  <div class="stats-board">
    <div class="stat">⭐ SCORE <span id="score">0</span></div>
    <div class="stat">📊 LEVEL <span id="level">1</span></div>
    <div class="stat">✅ CORRECT <span id="correctCount">0</span></div>
    <div class="stat">🏆 HIGHEST <span id="highScore">0</span></div>
  </div>

  <div class="calculator">
    <div class="display" id="calcDisplay">0</div>
    <div class="button-grid">
      <button class="calc-btn" data-value="7">7</button>
      <button class="calc-btn" data-value="8">8</button>
      <button class="calc-btn" data-value="9">9</button>
      <button class="calc-btn operator" data-op="+">+</button>
      <button class="calc-btn clear-btn" id="clearBtn">C</button>
      
      <button class="calc-btn" data-value="4">4</button>
      <button class="calc-btn" data-value="5">5</button>
      <button class="calc-btn" data-value="6">6</button>
      <button class="calc-btn operator" data-op="-">-</button>
      <button class="calc-btn" data-value="0">0</button>
      
      <button class="calc-btn" data-value="1">1</button>
      <button class="calc-btn" data-value="2">2</button>
      <button class="calc-btn" data-value="3">3</button>
      <button class="calc-btn operator" data-op="*">×</button>
      <button class="calc-btn operator" data-op="/">÷</button>
      
      <button class="calc-btn special" id="clearAllBtn">AC</button>
      <button class="calc-btn special" id="backspaceBtn">⌫</button>
      <button class="calc-btn equals" id="equalsBtn">=</button>
      <button class="calc-btn special" id="negativeBtn">+/−</button>
    </div>
    <div class="message-area" id="messageArea">
      ⏱️ You have 5 lives! Answer quickly.
    </div>
  </div>

  <div class="leaderboard-section">
    <div class="leaderboard-title">🏆 Leaderboard</div>
    <div class="leaderboard-list" id="leaderboardList">
      <div class="leaderboard-item">✨ Loading scores... ✨</div>
    </div>
  </div>
</div>

<script>
  (function(){
    // DOM elements
    const container = document.getElementById('gameContainer');
    const livesArea = document.getElementById('livesArea');
    const questionEl = document.getElementById('questionText');
    const scoreSpan = document.getElementById('score');
    const levelSpan = document.getElementById('level');
    const correctSpan = document.getElementById('correctCount');
    const highScoreSpan = document.getElementById('highScore');
    const calcDisplay = document.getElementById('calcDisplay');
    const messageDiv = document.getElementById('messageArea');
    const timerFill = document.getElementById('timerFill');
    const timerTextSpan = document.getElementById('timerText');
    const comboDisplay = document.getElementById('comboDisplay');
    const leaderboardDiv = document.getElementById('leaderboardList');

    // ---------- Leaderboard Management ----------
    let highScores = [];
    function loadScores() {
      try {
        let stored = localStorage.getItem('mathHighScores');
        if (stored) highScores = JSON.parse(stored);
        else highScores = [];
      } catch(e) { highScores = []; }
      highScores.sort((a,b) => b.score - a.score);
      updateLeaderboardDisplay();
    }
    function saveScores() {
      localStorage.setItem('mathHighScores', JSON.stringify(highScores.slice(0,10)));
    }
    function addScore(name, scoreValue) {
      if (!name.trim()) name = "Mystery Adventurer";
      highScores.push({ name: name.trim(), score: scoreValue });
      highScores.sort((a,b) => b.score - a.score);
      if (highScores.length > 10) highScores.pop();
      saveScores();
      updateLeaderboardDisplay();
    }
    function updateLeaderboardDisplay() {
      if (!leaderboardDiv) return;
      if (highScores.length === 0) {
        leaderboardDiv.innerHTML = '<div class="leaderboard-item">✨ No scores yet ✨</div>';
        return;
      }
      let html = '';
      highScores.forEach((item, idx) => {
        html += `<div class="leaderboard-item">
                    <span class="leaderboard-rank">${idx+1}</span>
                    <span>${escapeHtml(item.name)}</span>
                    <span>⭐ ${item.score}</span>
                  </div>`;
      });
      leaderboardDiv.innerHTML = html;
    }
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    function getCurrentHighScore() {
      if (highScores.length === 0) return 0;
      return highScores[0].score;
    }
    function updateHighScoreDisplay() {
      highScoreSpan.innerText = getCurrentHighScore();
    }

    // ---------- Game State ----------
    let lives = 5;
    let currentQuestion = { text: "", answer: 0 };
    let score = 0;
    let level = 1;
    let correctAnswers = 0;
    let combo = 1;
    let timer = 10.0;
    let timerInterval = null;
    let waitingForAnswer = false;
    let gameActive = true;
    let expression = "0";
    let currentValue = 0;

    function updateLivesDisplay() {
      let heartsHtml = '';
      for (let i=0; i<5; i++) {
        heartsHtml += (i < lives) ? '❤️ ' : '🖤 ';
      }
      livesArea.innerHTML = heartsHtml;
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startTimer() {
      if (!gameActive) return;
      stopTimer();
      timer = 10.0;
      updateTimerUI();
      timerInterval = setInterval(() => {
        if (!waitingForAnswer || !gameActive) return;
        timer -= 0.1;
        if (timer <= 0) {
          timer = 0;
          updateTimerUI();
          if (waitingForAnswer && gameActive) {
            waitingForAnswer = false;
            stopTimer();
            loseLife("⏰ Time's up!");
          }
        } else {
          updateTimerUI();
          if (timer < 3) {
            document.querySelector('.timer-text').style.color = "#ff3333";
            document.querySelector('.timer-bar-fill').style.background = "linear-gradient(90deg, #ff6666, #ff0000)";
          } else {
            document.querySelector('.timer-text').style.color = "#ffaa66";
            document.querySelector('.timer-bar-fill').style.background = "linear-gradient(90deg, #facc15, #ff4d4d)";
          }
        }
      }, 100);
    }

    function updateTimerUI() {
      let percent = (timer / 10.0) * 100;
      timerFill.style.width = `${Math.max(0, percent)}%`;
      timerTextSpan.innerText = timer.toFixed(1);
    }

    function loseLife(reason) {
      if (!gameActive) return;
      lives--;
      updateLivesDisplay();
      combo = 1;
      updateComboDisplay();
      container.classList.add('shake');
      setTimeout(() => container.classList.remove('shake'), 300);
      messageDiv.style.backgroundColor = "#4a0f0f";
      messageDiv.innerHTML = `❌ ${reason}! You lost a life. ${lives} lives left.`;
      setTimeout(() => messageDiv.style.backgroundColor = "", 1200);
      
      if (lives <= 0) {
        gameOver();
        return;
      }
      waitingForAnswer = false;
      stopTimer();
      generateQuestion();
      startTimer();
      waitingForAnswer = true;
      expression = "0";
      currentValue = 0;
      updateDisplay();
    }

    function gameOver() {
      gameActive = false;
      waitingForAnswer = false;
      stopTimer();
      const overlay = document.createElement('div');
      overlay.className = 'game-overlay';
      overlay.innerHTML = `
        <div class="game-over-text">💀 GAME OVER 💀</div>
        <div class="final-score">⭐ Your score: ${score} | Level: ${level}</div>
        <input type="text" id="playerNameInput" class="name-input" placeholder="Enter your name" maxlength="15">
        <button id="saveScoreBtn" class="save-btn">💾 Save Score</button>
        <button id="overlayRestartBtn" class="restart-overlay-btn">🔥 Play Again 🔥</button>
      `;
      container.style.position = 'relative';
      container.appendChild(overlay);
      
      const saveBtn = overlay.querySelector('#saveScoreBtn');
      const restartBtn = overlay.querySelector('#overlayRestartBtn');
      const nameInput = overlay.querySelector('#playerNameInput');
      
      saveBtn.addEventListener('click', () => {
        let playerName = nameInput.value.trim();
        if (playerName === "") playerName = "Adventurer";
        addScore(playerName, score);
        updateHighScoreDisplay();
        saveBtn.innerText = "✓ Saved!";
        setTimeout(() => saveBtn.innerText = "💾 Save Score", 1500);
      });
      
      restartBtn.addEventListener('click', () => {
        overlay.remove();
        fullReset();
      });
    }

    function handleCorrect() {
      let points = Math.floor(10 + level * 1.5 + (timer * 0.8) + (combo * 2));
      points = Math.max(5, points);
      score += points;
      correctAnswers++;
      combo++;
      if (combo > 12) combo = 12;
      updateComboDisplay();
      
      messageDiv.style.backgroundColor = "#1f5a2e";
      messageDiv.innerHTML = `✅ Correct! +${points} (Combo x${combo-1}) 🔥`;
      setTimeout(() => messageDiv.style.backgroundColor = "", 800);
      
      let newLevel = 1 + Math.floor(correctAnswers / 3);
      if (newLevel > level) {
        level = newLevel;
        messageDiv.innerHTML += ` 🎉 Level ${level}! 🎉`;
        container.style.borderColor = "#ffaa44";
        setTimeout(() => container.style.borderColor = "#ff5e3a", 300);
      }
      updateUI();
      if (score > getCurrentHighScore()) {
        updateHighScoreDisplay();
      }
      waitingForAnswer = false;
      stopTimer();
      generateQuestion();
      startTimer();
      waitingForAnswer = true;
      expression = "0";
      currentValue = 0;
      updateDisplay();
    }

    function generateQuestion() {
      let maxNum = Math.min(25 + level * 6, 250);
      let useDivision = (level >= 4) && (Math.random() < 0.25);
      let useMultiplication = (level >= 2) && (Math.random() < 0.4);
      
      let a, b, answer, text;
      if (useDivision && level >= 4) {
        let divisor = Math.floor(Math.random() * (Math.min(maxNum/3, 15))) + 2;
        let quotient = Math.floor(Math.random() * (Math.min(maxNum/divisor, 15))) + 1;
        a = divisor * quotient;
        b = divisor;
        answer = quotient;
        text = `${a} ÷ ${b} = ?`;
      } else if (useMultiplication) {
        a = Math.floor(Math.random() * (Math.min(maxNum/5, 12))) + 2;
        b = Math.floor(Math.random() * (Math.min(maxNum/a, 12))) + 2;
        answer = a * b;
        text = `${a} × ${b} = ?`;
      } else {
        let isSubtraction = (Math.random() > 0.5);
        if (isSubtraction) {
          a = Math.floor(Math.random() * maxNum) + 10;
          b = Math.floor(Math.random() * (a - 1)) + 1;
          answer = a - b;
          text = `${a} - ${b} = ?`;
        } else {
          a = Math.floor(Math.random() * maxNum) + 1;
          b = Math.floor(Math.random() * (maxNum - a + 5)) + 1;
          answer = a + b;
          text = `${a} + ${b} = ?`;
        }
      }
      currentQuestion = { text, answer };
      questionEl.innerText = text;
    }

    function updateComboDisplay() {
      comboDisplay.innerHTML = `🔥 Combo: x${combo}`;
      if (combo >= 5) comboDisplay.classList.add('combo-glow');
      else comboDisplay.classList.remove('combo-glow');
    }

    function updateUI() {
      scoreSpan.innerText = score;
      levelSpan.innerText = level;
      correctSpan.innerText = correctAnswers;
      updateHighScoreDisplay();
    }

    function checkAnswer() {
      if (!gameActive || !waitingForAnswer) return;
      let userAnswer = currentValue;
      if (isNaN(userAnswer)) {
        messageDiv.innerHTML = "⚠️ Please enter a valid number!";
        return;
      }
      let correct = currentQuestion.answer;
      if (Math.abs(userAnswer - correct) < 0.001) {
        handleCorrect();
      } else {
        waitingForAnswer = false;
        stopTimer();
        loseLife(`Wrong answer! Correct: ${correct}`);
      }
    }

    function fullReset() {
      gameActive = true;
      lives = 5;
      score = 0;
      level = 1;
      correctAnswers = 0;
      combo = 1;
      updateLivesDisplay();
      updateComboDisplay();
      updateUI();
      generateQuestion();
      waitingForAnswer = false;
      stopTimer();
      startTimer();
      waitingForAnswer = true;
      expression = "0";
      currentValue = 0;
      updateDisplay();
      messageDiv.innerHTML = "🔥 New game! You have 5 lives. 🔥";
      messageDiv.style.backgroundColor = "";
      container.classList.remove('shake');
    }

    // Calculator logic
    function evaluateExpression(expr) {
      try {
        let sanitized = expr.replace(/×/g, '*').replace(/÷/g, '/');
        let result = Function('"use strict";return (' + sanitized + ')')();
        return (isNaN(result) || !isFinite(result)) ? NaN : result;
      } catch(e) { return NaN; }
    }

    function updateExpression(newExpr) {
      expression = newExpr;
      if (expression === "") expression = "0";
      let evaluated = evaluateExpression(expression);
      if (!isNaN(evaluated) && isFinite(evaluated)) currentValue = evaluated;
      else currentValue = 0;
      updateDisplay();
    }

    function updateDisplay() {
      calcDisplay.innerText = expression.length > 28 ? expression.slice(0,26)+"…" : expression;
    }

    // Button bindings
    function initButtons() {
      document.querySelectorAll('.calc-btn[data-value]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!gameActive) return;
          let val = btn.getAttribute('data-value');
          if (expression === "0") expression = val;
          else expression += val;
          updateExpression(expression);
        });
      });
      document.querySelectorAll('.calc-btn[data-op]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!gameActive) return;
          let op = btn.getAttribute('data-op');
          let last = expression.slice(-1);
          if ("+-*/".includes(last)) expression = expression.slice(0, -1);
          expression += op;
          updateExpression(expression);
        });
      });
      document.getElementById('clearBtn').addEventListener('click', () => {
        if (!gameActive) return;
        expression = "0";
        updateExpression(expression);
      });
      document.getElementById('clearAllBtn').addEventListener('click', () => {
        if (!gameActive) return;
        expression = "0";
        updateExpression(expression);
      });
      document.getElementById('backspaceBtn').addEventListener('click', () => {
        if (!gameActive) return;
        if (expression.length > 1) expression = expression.slice(0, -1);
        else expression = "0";
        updateExpression(expression);
      });
      document.getElementById('negativeBtn').addEventListener('click', () => {
        if (!gameActive) return;
        let val = currentValue;
        let newVal = -val;
        expression = newVal.toString();
        updateExpression(expression);
      });
      document.getElementById('equalsBtn').addEventListener('click', () => {
        if (!gameActive) return;
        checkAnswer();
      });
    }

    function init() {
      loadScores();
      initButtons();
      fullReset();
    }

    init();
  })();
</script>
</body>
</html>
