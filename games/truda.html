        const DARES_AR = [

            "دع شخصاً يسجلك وأنت تقول شيئاً مضحكاً.",
            "قم بمشهد قتال بطيء الحركة مع خصم وهمي.",
            "تظاهر بأنك جد/جدة لمدة دقيقتين.",
            "دع شخصاً يكوم أشياء على رأسك.",
            "قم بمشية درامية بطيئة أثناء التزامن الشفوي.",
            "قم بتقليد كلب (نباح وكل شيء) لمدة دقيقة.",
            "دع شخصاً يقرر 'مشيتك المميزة' الجديدة.",
            "قم بـ 15 قفزة أثناء غناء أغنية عيد الميلاد.",
            "تظاهر بأنك مرآة لشخص (انسخ حركاته).",
            "قم بالوقوف على يديك ضد الحائط لمدة 15 ثانية.",
            "دع شخصاً يكتب 'رسالة' على ذراعك بقلم.",
            "قم بتفسير درامي لتوقعات الطقس.",
            "تظاهر بأنك في فيديو موسيقي لمدة دقيقة.",
            "قم بتقليد حيوان اللاما لمدة 30 ثانية.",
            "دع شخصاً يلقي 'خطاباً تحفيزياً' لك.",
            "قم بروتين كوميدي لمدة 30 ثانية عن الغرفة.",
            "تظاهر بأنك مراسل أخبار يصف حدثاً عادياً.",
            "دع شخصاً يصنع لك قبعة ورقية وارتدها.",
            "قم بإعادة تمثيل بطيئة الحركة لحدث حديث.",
            "قم بتقليد طائر (نعيق وكل شيء) لمدة 30 ثانية.",
            "دع شخصاً 'يقابلك' كشخص مشهور.",
            "قم بقراءة درامية لنص من هاتفك.",
            "تظاهر بأنك جني يحقق الأمنيات لمدة دقيقتين.",
            "دع شخصاً يمنحك 'عبارة مميزة' جديدة واستخدمها.",
            "قم بـ 10 تمارين قرفصاء أثناء ترديد الأبجدية.",
            "قم بتقليد حصان يعدو عبر الغرفة.",
            "دع شخصاً يختار 'صوتك' لمدة 3 دقائق.",
            "قم بإعادة تمثيل درامي لروتينك الصباحي.",
            "تظاهر بأنك سائح في منزلك لمدة دقيقتين.",
            "دع شخصاً 'يخرجك' في مشهد.",
            "قم بأداء فيلم صامت لمدة 30 ثانية.",
            "قم بتقليد شخصية كرتونية لمدة دقيقة.",
            "دع شخصاً يمنحك 'هوية جديدة' (اسم ومهنة)."
        ];

        // Combine all prompts
        const ALL_TRUTHS_EN = [...TRUTHS_EN];
        const ALL_DARES_EN = [...DARES_EN];
        const ALL_TRUTHS_AR = [...TRUTHS_AR];
        const ALL_DARES_AR = [...DARES_AR];

        // Current language state
        let currentLang = 'ar'; // 'ar' or 'en'

        // Shuffle function (Fisher–Yates)
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ─── STATE ──────────────────────────────────────────────────────
        let truthHistory = [];
        let dareHistory = [];
        let totalUsed = 0;

        // Pre-shuffle copies
        let truthPool = shuffleArray([...ALL_TRUTHS_AR]);
        let darePool = shuffleArray([...ALL_DARES_AR]);

        // DOM refs
        const promptText = document.getElementById('promptText');
        const typeBadge = document.getElementById('typeBadge');
        const promptNumber = document.getElementById('promptNumber');
        const counterDisplay = document.getElementById('counterDisplay');
        const promptCard = document.getElementById('promptCard');
        const titleMain = document.getElementById('titleMain');
        const subBadge = document.getElementById('subBadge');
        const truthBtn = document.getElementById('truthBtn');
        const dareBtn = document.getElementById('dareBtn');
        const randomBtn = document.getElementById('randomBtn');
        const resetBtn = document.getElementById('resetBtn');
        const langAr = document.getElementById('langAr');
        const langEn = document.getElementById('langEn');

        // ─── HELPERS ────────────────────────────────────────────────────
        function getCurrentTruths() {
            return currentLang === 'ar' ? ALL_TRUTHS_AR : ALL_TRUTHS_EN;
        }

        function getCurrentDares() {
            return currentLang === 'ar' ? ALL_DARES_AR : ALL_DARES_EN;
        }

        function getTruthPool() {
            return currentLang === 'ar' ? truthPool : truthPoolEn;
        }

        function getDarePool() {
            return currentLang === 'ar' ? darePool : darePoolEn;
        }

        // Separate pools for each language
        let truthPoolEn = shuffleArray([...ALL_TRUTHS_EN]);
        let darePoolEn = shuffleArray([...ALL_DARES_EN]);

        function updateCounter() {
            const total = truthHistory.length + dareHistory.length;
            if (currentLang === 'ar') {
                counterDisplay.innerHTML = `<strong>${total}</strong> مستخدم · ${truthHistory.length}T ${dareHistory.length}J`;
            } else {
                counterDisplay.innerHTML = `<strong>${total}</strong> used · ${truthHistory.length}T ${dareHistory.length}D`;
            }
        }

        function getNextTruth() {
            const pool = currentLang === 'ar' ? truthPool : truthPoolEn;
            const allTruths = getCurrentTruths();
            
            if (pool.length === 0) {
                const remaining = allTruths.filter(t => !truthHistory.includes(t));
                const newPool = shuffleArray(remaining.length > 0 ? remaining : [...allTruths]);
                if (currentLang === 'ar') {
                    truthPool = newPool;
                } else {
                    truthPoolEn = newPool;
                }
                if (newPool.length === 0) {
                    truthHistory = [];
                    if (currentLang === 'ar') {
                        truthPool = shuffleArray([...allTruths]);
                    } else {
                        truthPoolEn = shuffleArray([...allTruths]);
                    }
                }
            }
            
            const currentPool = currentLang === 'ar' ? truthPool : truthPoolEn;
            const prompt = currentPool.pop();
            truthHistory.push(prompt);
            totalUsed++;
            updateCounter();
            return prompt;
        }

        function getNextDare() {
            const pool = currentLang === 'ar' ? darePool : darePoolEn;
            const allDares = getCurrentDares();
            
            if (pool.length === 0) {
                const remaining = allDares.filter(d => !dareHistory.includes(d));
                const newPool = shuffleArray(remaining.length > 0 ? remaining : [...allDares]);
                if (currentLang === 'ar') {
                    darePool = newPool;
                } else {
                    darePoolEn = newPool;
                }
                if (newPool.length === 0) {
                    dareHistory = [];
                    if (currentLang === 'ar') {
                        darePool = shuffleArray([...allDares]);
                    } else {
                        darePoolEn = shuffleArray([...allDares]);
                    }
                }
            }
            
            const currentPool = currentLang === 'ar' ? darePool : darePoolEn;
            const prompt = currentPool.pop();
            dareHistory.push(prompt);
            totalUsed++;
            updateCounter();
            return prompt;
        }

        function getRandomPrompt() {
            if (Math.random() < 0.5) {
                return { type: currentLang === 'ar' ? 'الحقيقة' : 'Truth', text: getNextTruth() };
            } else {
                return { type: currentLang === 'ar' ? 'الجرأة' : 'Dare', text: getNextDare() };
            }
        }

        // ─── DISPLAY ────────────────────────────────────────────────────
        function displayPrompt(type, text) {
            typeBadge.textContent = type.toUpperCase();
            promptText.innerHTML = text;
            const total = truthHistory.length + dareHistory.length;
            if (currentLang === 'ar') {
                promptNumber.textContent = `# ${total} · ${truthHistory.length}T ${dareHistory.length}J`;
            } else {
                promptNumber.textContent = `# ${total} · ${truthHistory.length}T ${dareHistory.length}D`;
            }
            // subtle card flash
            const isTruth = type === 'الحقيقة' || type === 'Truth';
            promptCard.style.transition = 'background 0.1s';
            promptCard.style.background = isTruth
                ? 'rgba(70, 60, 160, 0.25)'
                : 'rgba(160, 60, 100, 0.25)';
            setTimeout(() => {
                promptCard.style.background = 'rgba(10, 8, 28, 0.6)';
            }, 180);
        }

        // ─── ACTIONS ────────────────────────────────────────────────────
        function showTruth() {
            const text = getNextTruth();
            const type = currentLang === 'ar' ? 'الحقيقة' : 'Truth';
            displayPrompt(type, text);
        }

        function showDare() {
            const text = getNextDare();
            const type = currentLang === 'ar' ? 'الجرأة' : 'Dare';
            displayPrompt(type, text);
        }

        function showRandom() {
            const { type, text } = getRandomPrompt();
            displayPrompt(type, text);
        }

        function resetHistory() {
            truthHistory = [];
            dareHistory = [];
            totalUsed = 0;
            
            const allTruths = getCurrentTruths();
            const allDares = getCurrentDares();
            
            if (currentLang === 'ar') {
                truthPool = shuffleArray([...allTruths]);
                darePool = shuffleArray([...allDares]);
            } else {
                truthPoolEn = shuffleArray([...allTruths]);
                darePoolEn = shuffleArray([...allDares]);
            }
            
            updateCounter();
            
            if (currentLang === 'ar') {
                promptText.innerHTML = '✨ تم إعادة التعيين · جاهز للعب';
                typeBadge.textContent = '✦ إعادة تعيين';
                promptNumber.textContent = '# 0';
            } else {
                promptText.innerHTML = '✨ Reset · ready to play';
                typeBadge.textContent = '✦ reset';
                promptNumber.textContent = '# 0';
            }
            promptCard.style.background = 'rgba(10, 8, 28, 0.6)';
        }

        // ─── LANGUAGE SWITCH ────────────────────────────────────────────
        function switchLanguage(lang) {
            if (lang === currentLang) return;
            
            // Save current state
            const currentTruthHistory = [...truthHistory];
            const currentDareHistory = [...dareHistory];
            
            // Switch language
            currentLang = lang;
            
            // Update UI direction
            document.body.className = lang === 'ar' ? 'lang-ar' : 'lang-en';
            
            // Update language buttons
            langAr.classList.toggle('active', lang === 'ar');
            langEn.classList.toggle('active', lang === 'en');
            
            // Update title and badges
            if (lang === 'ar') {
                titleMain.textContent = '⚡ الحقيقة · الجرأة';
                subBadge.textContent = '🔥 200+ سؤال';
                truthBtn.innerHTML = '🔮 الحقيقة';
                dareBtn.innerHTML = '⚡ الجرأة';
                randomBtn.innerHTML = '🎲 عشوائي';
                resetBtn.textContent = '⟳ إعادة تعيين';
                typeBadge.textContent = '✦ جاهز';
                promptText.innerHTML = 'اختر <strong style="color:#f5c542;">الحقيقة</strong> أو <strong style="color:#ff8a9e;">الجرأة</strong>';
            } else {
                titleMain.textContent = '⚡ TRUTH · DARE';
                subBadge.textContent = '🔥 200+ prompts';
                truthBtn.innerHTML = '🔮 Truth';
                dareBtn.innerHTML = '⚡ Dare';
                randomBtn.innerHTML = '🎲 Random';
                resetBtn.textContent = '⟳ reset';
                typeBadge.textContent = '✦ ready';
                promptText.innerHTML = 'Tap <strong style="color:#f5c542;">Truth</strong> or <strong style="color:#ff8a9e;">Dare</strong>';
            }
            
            // Restore history (filter out prompts not in current language)
            const allTruths = getCurrentTruths();
            const allDares = getCurrentDares();
            
            truthHistory = currentTruthHistory.filter(t => allTruths.includes(t));
            dareHistory = currentDareHistory.filter(d => allDares.includes(d));
            
            // Rebuild pools
            const usedTruths = truthHistory;
            const usedDares = dareHistory;
            
            const remainingTruths = allTruths.filter(t => !usedTruths.includes(t));
            const remainingDares = allDares.filter(d => !usedDares.includes(d));
            
            if (lang === 'ar') {
                truthPool = shuffleArray(remainingTruths.length > 0 ? remainingTruths : [...allTruths]);
                darePool = shuffleArray(remainingDares.length > 0 ? remainingDares : [...allDares]);
            } else {
                truthPoolEn = shuffleArray(remainingTruths.length > 0 ? remainingTruths : [...allTruths]);
                darePoolEn = shuffleArray(remainingDares.length > 0 ? remainingDares : [...allDares]);
            }
            
            updateCounter();
            
            // Show first prompt or status
            if (truthHistory.length > 0 || dareHistory.length > 0) {
                const lastTruth = truthHistory[truthHistory.length - 1];
                const lastDare = dareHistory[dareHistory.length - 1];
                if (lastTruth && (!lastDare || truthHistory.length >= dareHistory.length)) {
                    const type = lang === 'ar' ? 'الحقيقة' : 'Truth';
                    displayPrompt(type, lastTruth);
                } else if (lastDare) {
                    const type = lang === 'ar' ? 'الجرأة' : 'Dare';
                    displayPrompt(type, lastDare);
                } else {
                    if (lang === 'ar') {
                        promptText.innerHTML = 'اختر <strong style="color:#f5c542;">الحقيقة</strong> أو <strong style="color:#ff8a9e;">الجرأة</strong>';
                        typeBadge.textContent = '✦ جاهز';
                    } else {
                        promptText.innerHTML = 'Tap <strong style="color:#f5c542;">Truth</strong> or <strong style="color:#ff8a9e;">Dare</strong>';
                        typeBadge.textContent = '✦ ready';
                    }
                }
            }
        }

        // ─── KEYBOARD SHORTCUTS ────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 't' || e.key === 'T') {
                e.preventDefault();
                showTruth();
            } else if (e.key === 'd' || e.key === 'D') {
                e.preventDefault();
                showDare();
            } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                showRandom();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                resetHistory();
            }
        });

        // ─── INIT ──────────────────────────────────────────────────────
        function init() {
            // Set default language (Arabic)
            currentLang = 'ar';
            document.body.className = 'lang-ar';
            langAr.classList.add('active');
            langEn.classList.remove('active');
            
            // Seed with random prompt
            const { type, text } = getRandomPrompt();
            displayPrompt(type, text);
            updateCounter();

            // Event listeners
            truthBtn.addEventListener('click', showTruth);
            dareBtn.addEventListener('click', showDare);
            randomBtn.addEventListener('click', showRandom);
            resetBtn.addEventListener('click', resetHistory);
            
            langAr.addEventListener('click', () => switchLanguage('ar'));
            langEn.addEventListener('click', () => switchLanguage('en'));

            // Touch feedback for mobile
            [truthBtn, dareBtn, randomBtn].forEach(btn => {
                btn.addEventListener('touchstart', () => {
                    btn.style.transform = 'scale(0.94)';
                }, { passive: true });
                btn.addEventListener('touchend', () => {
                    btn.style.transform = '';
                }, { passive: true });
            });
        }

        init();
    })();
</script>
